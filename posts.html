<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Posts</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>
  <header id="header" class="site-header"></header>

  <main class="container">
    <div class="posts-header">
      <h1>All posts</h1>

      <div class="posts-filters">
        <div class="filter-group search autocomplete">
          <input type="text" id="posts-filter-tag" placeholder="Search tags..." value=""/>
          <div class="icon">
            <svg width="800px" height="800px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <g id="SVGRepo_bgCarrier" stroke-width="0" />
              <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round" />
              <g id="SVGRepo_iconCarrier">
                <path d="M15 15L21 21" stroke="#000000" stroke-width="2" stroke-linecap="round"
                  stroke-linejoin="round" />
                <path
                  d="M17 10C17 13.866 13.866 17 10 17C6.13401 17 3 13.866 3 10C3 6.13401 6.13401 3 10 3C13.866 3 17 6.13401 17 10Z"
                  stroke="#000000" stroke-width="2" />
              </g>
            </svg>
          </div>
          <div class="autocomplete-menu">
          </div>
        </div>
      </div>
    </div>

    <template id="post-template">
      <div class="post-card">
        <div class="post-meta">
          <span class="date"></span>
          <div class="tags"></div>
        </div>

        <h2 class="title"></h2>
        <p class="excerpt"></p>
        <div class="content"></div>
        <button class="toggle-btn">Read more</button>
      </div>
    </template>
    <section class="posts-list" id="postsList">
    </section>
  </main>

  <footer id="footer" class="site-footer"></footer>

  <script src="js/layout.js"></script>
  <script src="js/posts.js"></script>
</body>

</html>
