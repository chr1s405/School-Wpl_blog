<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Posts</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>
  <header id="header" class="site-header"></header>

  <main class="container">
    <div class="posts-header">
      <h1>All posts</h1>

      <div class="posts-filters">
        <div class="filter-group sort dropdown">
          <button id="posts-filter-sort" class="filter" readonly>Latest</button>
          <div class="icon">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
              <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
              <g id="SVGRepo_iconCarrier"> 
                <path fill-rule="evenodd" clip-rule="evenodd" d="M12.7071 14.7071C12.3166 15.0976 11.6834 15.0976 11.2929 14.7071L6.29289 9.70711C5.90237 9.31658 5.90237 8.68342 6.29289 8.29289C6.68342 7.90237 7.31658 7.90237 7.70711 8.29289L12 12.5858L16.2929 8.29289C16.6834 7.90237 17.3166 7.90237 17.7071 8.29289C18.0976 8.68342 18.0976 9.31658 17.7071 9.70711L12.7071 14.7071Z" fill="#000000"></path> 
              </g>
            </svg>
          </div>
          <div class="dropdown-menu">
            <button class="dropdown-item active" data-value="latest" data-label="Latest">Latest</button>
            <button class="dropdown-item" data-value="oldest" data-label="Oldest">Oldest</button>
          </div>
        </div>
        <div class="filter-group search autocomplete">
          <input type="text" id="posts-filter-tag" class="filter" placeholder="Search tags..." value=""/>
          <div class="icon">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <g id="SVGRepo_bgCarrier" stroke-width="0" />
              <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round" />
              <g id="SVGRepo_iconCarrier">
                <path d="M15 15L21 21" stroke="#000000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                <path d="M17 10C17 13.866 13.866 17 10 17C6.13401 17 3 13.866 3 10C3 6.13401 6.13401 3 10 3C13.866 3 17 6.13401 17 10Z" stroke="#000000" stroke-width="2" />
              </g>
            </svg>
          </div>
          <div class="autocomplete-menu">
          </div>
        </div>
      </div>
    </div>

    <template id="post-template">
      <div class="post-card">
        <div class="post-meta">
          <span class="date"></span>
          <div class="tags"></div>
        </div>

        <h2 class="title"></h2>
        <p class="excerpt"></p>
        <div class="content"></div>
        <button class="toggle-btn">Read more</button>
      </div>
    </template>
    <section class="posts-list" id="postsList">
    </section>
  </main>

  <footer id="footer" class="site-footer"></footer>

  <script src="js/layout.js"></script>
  <script src="js/posts.js"></script>
</body>

</html>
